name: Scrape future dives

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Commit validated JSON files to this repository"
        required: true
        type: boolean
        default: true

  schedule:
    - cron: "7,22,37,52 * * * *"
      timezone: "Australia/Sydney"

permissions:
  contents: write

concurrency:
  group: abyss-future-dive-feed
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      SOURCE_URL: https://www.abyss.com.au/widget-all
      OUTPUT_DIR: data
      DIAGNOSTICS_DIR: diagnostics
      MIN_INITIAL_DELAY_MS: "10000"
      WIDGET_TIMEOUT_MS: "90000"
      STABILITY_POLL_MS: "1000"
      STABLE_POLLS_REQUIRED: "3"
      FINAL_SETTLE_MS: "1500"
      FUTURE_START_OFFSET_DAYS: "21"
      MAX_STALE_HOURS: "48"
      MAX_PAGES_PER_SOURCE: "10"
      HEADLESS: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm test

      - name: Scrape and build candidate feed
        run: npm run scrape

      - name: Validate published feed
        run: npm run validate

      - name: Print feed summary
        run: npm run summary

      - name: Upload feed and diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: future-dive-scrape-${{ github.run_number }}
          path: |
            data/
            diagnostics/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit validated feed
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
        run: |
          git config user.name "abyss-future-dive-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage new, changed and deleted feed files before checking.
          git add -A data

          # Check the staged changes, including previously untracked files.
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi

          git status --short
          git commit -m "chore: refresh future dive feed"
          git push
